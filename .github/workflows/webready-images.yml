name: Webready Images

on:
  workflow_call:
    inputs:
      source-dir:
        description: "Source image directory"
        required: false
        type: string
        default: "assets/img"
      output-dir:
        description: "Output directory for generated web images"
        required: false
        type: string
        default: "assets/img/web"
      quality:
        description: "JPEG quality (1-100)"
        required: false
        type: number
        default: 80
      suffix:
        description: "Suffix appended before .jpg"
        required: false
        type: string
        default: "-web"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sharp
        shell: bash
        run: npm install sharp@0.34.5 --no-save --no-fund --no-audit

      - name: Generate webready images
        shell: bash
        env:
          SOURCE_DIR: ${{ inputs.source-dir }}
          OUTPUT_DIR: ${{ inputs.output-dir }}
          QUALITY: ${{ inputs.quality }}
          SUFFIX: ${{ inputs.suffix }}
        run: |
          node <<'EOF'
          const fs = require("node:fs/promises");
          const path = require("node:path");
          const sharp = require("sharp");

          const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
          const sourceDir = path.resolve(workspace, process.env.SOURCE_DIR || "assets/img");
          const outputDir = path.resolve(workspace, process.env.OUTPUT_DIR || "assets/img/web");
          const suffix = process.env.SUFFIX || "-web";

          const parsedQuality = Number.parseInt(process.env.QUALITY || "80", 10);
          const quality = Number.isFinite(parsedQuality)
            ? Math.min(100, Math.max(1, parsedQuality))
            : 80;

          const supportedExtensions = new Set([
            ".png",
            ".jpg",
            ".jpeg",
            ".webp",
            ".avif",
            ".tif",
            ".tiff",
            ".gif"
          ]);

          function isSubPath(targetPath, parentPath) {
            const rel = path.relative(parentPath, targetPath);
            return rel === "" || (!rel.startsWith("..") && !path.isAbsolute(rel));
          }

          async function pathExists(target) {
            try {
              await fs.access(target);
              return true;
            } catch {
              return false;
            }
          }

          async function* walk(dir) {
            const entries = await fs.readdir(dir, { withFileTypes: true });

            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);

              if (isSubPath(fullPath, outputDir)) {
                continue;
              }

              if (entry.isDirectory()) {
                yield* walk(fullPath);
              } else if (entry.isFile()) {
                yield fullPath;
              }
            }
          }

          async function ensureDir(dir) {
            await fs.mkdir(dir, { recursive: true });
          }

          function buildOutputPath(inputFile) {
            const relative = path.relative(sourceDir, inputFile);
            const ext = path.extname(relative);
            const relativeWithoutExt = relative.slice(0, -ext.length);
            return path.join(outputDir, `${relativeWithoutExt}${suffix}.jpg`);
          }

          async function generateImage(inputFile, outputFile) {
            await ensureDir(path.dirname(outputFile));

            await sharp(inputFile)
              .rotate()
              .flatten({ background: "#ffffff" })
              .jpeg({
                quality,
                mozjpeg: true
              })
              .toFile(outputFile);
          }

          async function collectGeneratedCandidates(dir, result = []) {
            if (!(await pathExists(dir))) {
              return result;
            }

            const entries = await fs.readdir(dir, { withFileTypes: true });

            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);

              if (entry.isDirectory()) {
                await collectGeneratedCandidates(fullPath, result);
                continue;
              }

              if (
                entry.isFile() &&
                path.extname(entry.name).toLowerCase() === ".jpg" &&
                entry.name.endsWith(`${suffix}.jpg`)
              ) {
                result.push(fullPath);
              }
            }

            return result;
          }

          async function main() {
            if (!(await pathExists(sourceDir))) {
              console.log(`Source directory does not exist: ${sourceDir}`);
              process.exit(0);
            }

            await ensureDir(outputDir);

            const expectedOutputs = new Set();
            let changed = 0;
            let skipped = 0;

            for await (const inputFile of walk(sourceDir)) {
              const ext = path.extname(inputFile).toLowerCase();
              if (!supportedExtensions.has(ext)) {
                continue;
              }

              const outputFile = buildOutputPath(inputFile);
              expectedOutputs.add(outputFile);

              let shouldGenerate = true;

              if (await pathExists(outputFile)) {
                const [srcStat, outStat] = await Promise.all([
                  fs.stat(inputFile),
                  fs.stat(outputFile)
                ]);

                if (outStat.mtimeMs >= srcStat.mtimeMs) {
                  shouldGenerate = false;
                }
              }

              if (shouldGenerate) {
                console.log(`Generate: ${path.relative(workspace, inputFile)} -> ${path.relative(workspace, outputFile)}`);
                await generateImage(inputFile, outputFile);
                changed++;
              } else {
                console.log(`Skip: ${path.relative(workspace, outputFile)}`);
                skipped++;
              }
            }

            const existingGenerated = await collectGeneratedCandidates(outputDir);
            let removed = 0;

            for (const file of existingGenerated) {
              if (!expectedOutputs.has(file)) {
                console.log(`Remove stale: ${path.relative(workspace, file)}`);
                await fs.unlink(file);
                removed++;
              }
            }

            console.log("");
            console.log("Done.");
            console.log(`Changed: ${changed}`);
            console.log(`Skipped: ${skipped}`);
            console.log(`Removed stale: ${removed}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Commit generated images if needed
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain -- "${{ inputs.output-dir }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${{ inputs.output-dir }}"
            git commit -m "chore(images): update webready images"
            git push
          else
            echo "No changes to commit."
          fi