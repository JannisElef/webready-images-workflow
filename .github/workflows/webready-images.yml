name: Webready Images

on:
  workflow_call:
    inputs:
      source-dir:
        type: string
        default: "assets/img"

      output-dir:
        type: string
        default: "assets/img/web"
      quality:
        type: number
        default: 80
      suffix:
        type: string
        default: "-web"
      max-width:
        type: number
      max-height:
        type: number

      generate-smaller:
        type: boolean
        default: false
      smaller-quality:
        type: number
        default: 65
      smaller-suffix:
        type: string
        default: "-smaller"
      smaller-max-width:
        type: number
        default: 512
      smaller-max-height:
        type: number
        default: 512

      generate-webp:
        type: boolean
        default: false
      webp-quality:
        type: number
        default: 78
      webp-suffix:
        type: string
        default: "-webp"
      webp-max-width:
        type: number
      webp-max-height:
        type: number

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install sharp
        run: npm install sharp@0.34.5 --no-save --no-fund --no-audit

      - name: Generate image variants
        env:
          SOURCE_DIR: ${{ inputs.source-dir }}

          OUTPUT_DIR: ${{ inputs.output-dir }}
          QUALITY: ${{ inputs.quality }}
          SUFFIX: ${{ inputs.suffix }}
          MAX_WIDTH: ${{ inputs.max-width }}
          MAX_HEIGHT: ${{ inputs.max-height }}

          GENERATE_SMALLER: ${{ inputs.generate-smaller }}
          SMALLER_QUALITY: ${{ inputs.smaller-quality }}
          SMALLER_SUFFIX: ${{ inputs.smaller-suffix }}
          SMALLER_MAX_WIDTH: ${{ inputs.smaller-max-width }}
          SMALLER_MAX_HEIGHT: ${{ inputs.smaller-max-height }}

          GENERATE_WEBP: ${{ inputs.generate-webp }}
          WEBP_QUALITY: ${{ inputs.webp-quality }}
          WEBP_SUFFIX: ${{ inputs.webp-suffix }}
          WEBP_MAX_WIDTH: ${{ inputs.webp-max-width }}
          WEBP_MAX_HEIGHT: ${{ inputs.webp-max-height }}

        run: |
          node <<'EOF'
          const fs = require("node:fs/promises");
          const path = require("node:path");
          const sharp = require("sharp");

          const workspace = process.env.GITHUB_WORKSPACE || process.cwd();
          const sourceDir = path.resolve(workspace, process.env.SOURCE_DIR);
          const rootOutputDir = path.resolve(workspace, process.env.OUTPUT_DIR);

          const supportedExtensions = new Set([
            ".png", ".jpg", ".jpeg", ".webp", ".avif", ".tif", ".tiff", ".gif"
          ]);

          function bool(v) {
            return String(v).toLowerCase() === "true";
          }

          function num(v) {
            const n = Number.parseInt(v || "", 10);
            return Number.isFinite(n) ? n : null;
          }

          const variants = [
            {
              dir: rootOutputDir,
              quality: num(process.env.QUALITY) || 80,
              suffix: process.env.SUFFIX || "-web",
              maxWidth: num(process.env.MAX_WIDTH),
              maxHeight: num(process.env.MAX_HEIGHT),
              format: "jpg"
            }
          ];

          if (bool(process.env.GENERATE_SMALLER)) {
            variants.push({
              dir: path.join(rootOutputDir, "smaller"),
              quality: num(process.env.SMALLER_QUALITY) || 65,
              suffix: process.env.SMALLER_SUFFIX || "-smaller",
              maxWidth: num(process.env.SMALLER_MAX_WIDTH),
              maxHeight: num(process.env.SMALLER_MAX_HEIGHT),
              format: "jpg"
            });
          }

          if (bool(process.env.GENERATE_WEBP)) {
            variants.push({
              dir: path.join(rootOutputDir, "webp"),
              quality: num(process.env.WEBP_QUALITY) || 78,
              suffix: process.env.WEBP_SUFFIX || "-webp",
              maxWidth: num(process.env.WEBP_MAX_WIDTH),
              maxHeight: num(process.env.WEBP_MAX_HEIGHT),
              format: "webp"
            });
          }

          async function pathExists(target) {
            try {
              await fs.access(target);
              return true;
            } catch {
              return false;
            }
          }

          async function* walk(dir) {
            const entries = await fs.readdir(dir, { withFileTypes: true });

            for (const entry of entries) {
              const fullPath = path.join(dir, entry.name);

              if (fullPath.startsWith(rootOutputDir)) continue;

              if (entry.isDirectory()) {
                yield* walk(fullPath);
              } else if (entry.isFile()) {
                yield fullPath;
              }
            }
          }

          async function ensureDir(dir) {
            await fs.mkdir(dir, { recursive: true });
          }

          function buildOutputPath(inputFile, variant) {
            const relative = path.relative(sourceDir, inputFile);
            const ext = path.extname(relative);
            const relativeWithoutExt = relative.slice(0, -ext.length);

            return path.join(
              variant.dir,
              `${relativeWithoutExt}${variant.suffix}.${variant.format}`
            );
          }

          async function shouldGenerate(inputFile, outputFile) {
            if (!(await pathExists(outputFile))) return true;

            const [srcStat, outStat] = await Promise.all([
              fs.stat(inputFile),
              fs.stat(outputFile)
            ]);

            return outStat.mtimeMs < srcStat.mtimeMs;
          }

          async function generateVariant(inputFile, outputFile, variant) {
            await ensureDir(path.dirname(outputFile));

            let pipeline = sharp(inputFile)
              .rotate()
              .flatten({ background: "#ffffff" });

            if (variant.maxWidth || variant.maxHeight) {
              pipeline = pipeline.resize({
                width: variant.maxWidth,
                height: variant.maxHeight,
                fit: "inside",
                withoutEnlargement: true
              });
            }

            if (variant.format === "webp") {
              await pipeline.webp({ quality: variant.quality }).toFile(outputFile);
            } else {
              await pipeline.jpeg({ quality: variant.quality, mozjpeg: true }).toFile(outputFile);
            }
          }

          async function main() {
            for (const variant of variants) {
              await ensureDir(variant.dir);
            }

            for await (const inputFile of walk(sourceDir)) {
              const ext = path.extname(inputFile).toLowerCase();
              if (!supportedExtensions.has(ext)) continue;

              for (const variant of variants) {
                const outputFile = buildOutputPath(inputFile, variant);

                if (await shouldGenerate(inputFile, outputFile)) {
                  console.log(`Generate: ${inputFile} -> ${outputFile}`);
                  await generateVariant(inputFile, outputFile, variant);
                } else {
                  console.log(`Skip: ${outputFile}`);
                }
              }
            }

            console.log("Done.");
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Commit generated images if needed
        run: |
          if [[ -n "$(git status --porcelain -- "${{ inputs.output-dir }}")" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${{ inputs.output-dir }}"
            git commit -m "chore(images): update webready images"
            git push
          else
            echo "No changes to commit."
          fi